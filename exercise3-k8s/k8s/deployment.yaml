apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: hello-world
  labels:
    app.kubernetes.io/name: hello-world
    app.kubernetes.io/version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
        app.kubernetes.io/name: hello-world
        app.kubernetes.io/version: "1.0"
    spec:
      # Do not attempt to pull from a remote registry —
      # the image is loaded directly into minikube's local daemon.
      containers:
        - name: hello-world
          image: hello-world-app:1.0
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /hello-world
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /hello-world
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
